<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <style>
      .bg { fill: #2E7D32; }
      .icon { fill: #ffffff; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="192" height="192" rx="32"/>
  
  <!-- House Icon -->
  <g class="icon">
    <!-- Roof -->
    <polygon points="96,48 48,96 156,96"/>
    <!-- House body -->
    <rect x="56" y="96" width="80" height="80" rx="2"/>
    <!-- Door -->
    <rect x="84" y="120" width="24" height="56" rx="2"/>
    <!-- Door handle -->
    <circle cx="108" cy="148" r="2.5"/>
    <!-- Window 1 -->
    <rect x="64" y="110" width="14" height="14" rx="1"/>
    <!-- Window 2 -->
    <rect x="114" y="110" width="14" height="14" rx="1"/>
  </g>
</svg>